<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password | Fiesta Liquor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/v2/styles.css">
  <style>
    body { min-height: 100vh; display: flex; flex-direction: column; }
    main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 2rem 1rem; }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      width: 100%;
      max-width: 420px;
      padding: 2rem;
    }
    .card h2 { font-size: 1.5rem; margin-bottom: 0.3rem; }
    .card .sub { color: var(--muted); font-size: 0.88rem; margin-bottom: 1.5rem; }
    .form-group { display: grid; gap: 0.3rem; margin-bottom: 1rem; }
    .form-group label { font-size: 0.8rem; font-weight: 500; }
    .form-group input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--bg-elevated);
      font: inherit;
      padding: 0.72rem 0.84rem;
      transition: border-color 150ms;
    }
    .form-group input:focus { outline: none; border-color: var(--accent); }
    .submit-btn {
      width: 100%;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 0.8rem;
      font: inherit;
      font-weight: 600;
      cursor: pointer;
      transition: background 150ms;
      margin-top: 0.25rem;
    }
    .submit-btn:hover { background: var(--accent-dark); }
    .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .msg {
      border-radius: 8px;
      padding: 0.65rem 0.8rem;
      font-size: 0.85rem;
      margin-bottom: 1rem;
      display: none;
    }
    .msg.error   { background: #fde8e8; color: #c0392b; display: block; }
    .msg.success { background: #e8f8ef; color: #1a7a4a; display: block; }
    .back { display: block; text-align: center; margin-top: 1.2rem; color: var(--muted); font-size: 0.85rem; text-decoration: none; }
    .back:hover { color: var(--accent); }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <div>
        <p class="eyebrow">Account Recovery</p>
        <h1><a href="/" style="text-decoration:none;color:inherit;">Fiesta Liquor</a></h1>
      </div>
    </div>
  </header>

  <main>
    <div class="card">

      <!-- Step 1: Request reset -->
      <div id="stepRequest">
        <h2>Forgot Password?</h2>
        <p class="sub">Enter your email and we'll send you a reset link.</p>
        <div id="reqMsg" class="msg"></div>
        <form id="requestForm" novalidate>
          <div class="form-group">
            <label for="resetEmail">Email Address</label>
            <input type="email" id="resetEmail" autocomplete="email" placeholder="you@example.com" required>
          </div>
          <button type="submit" class="submit-btn" id="reqBtn">Send Reset Link</button>
        </form>
        <a href="/auth" class="back">← Back to Sign In</a>
      </div>

      <!-- Step 2: Set new password (when token is in URL) -->
      <div id="stepReset" style="display:none">
        <h2>Set New Password</h2>
        <p class="sub">Choose a new password for your account.</p>
        <div id="rstMsg" class="msg"></div>
        <form id="resetForm" novalidate>
          <div class="form-group">
            <label for="newPwd">New Password</label>
            <input type="password" id="newPwd" autocomplete="new-password" placeholder="Min. 6 characters" required>
          </div>
          <div class="form-group">
            <label for="confirmPwd">Confirm Password</label>
            <input type="password" id="confirmPwd" autocomplete="new-password" placeholder="Repeat password" required>
          </div>
          <button type="submit" class="submit-btn" id="rstBtn">Update Password</button>
        </form>
      </div>

    </div>
  </main>

  <script src="/api.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');

    // Show the right step
    if (token) {
      document.getElementById('stepRequest').style.display = 'none';
      document.getElementById('stepReset').style.display = '';
    }

    // ─── Request reset ────────────────────────────────────────────────────────────
    document.getElementById('requestForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const msg = document.getElementById('reqMsg');
      const btn = document.getElementById('reqBtn');
      msg.className = 'msg';

      const email = document.getElementById('resetEmail').value.trim();
      if (!email) {
        msg.textContent = 'Please enter your email.';
        msg.className = 'msg error';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Sending…';
      try {
        await authAPI.requestPasswordReset(email);
        msg.textContent = 'Check your inbox — a reset link is on its way.';
        msg.className = 'msg success';
        document.getElementById('requestForm').style.display = 'none';
      } catch (err) {
        msg.textContent = err.message || 'Failed to send reset email. Please try again.';
        msg.className = 'msg error';
        btn.disabled = false;
        btn.textContent = 'Send Reset Link';
      }
    });

    // ─── Set new password ─────────────────────────────────────────────────────────
    document.getElementById('resetForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const msg = document.getElementById('rstMsg');
      const btn = document.getElementById('rstBtn');
      msg.className = 'msg';

      const newPwd     = document.getElementById('newPwd').value;
      const confirmPwd = document.getElementById('confirmPwd').value;

      if (!newPwd || newPwd.length < 6) {
        msg.textContent = 'Password must be at least 6 characters.';
        msg.className = 'msg error';
        return;
      }
      if (newPwd !== confirmPwd) {
        msg.textContent = 'Passwords do not match.';
        msg.className = 'msg error';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Updating…';
      try {
        await authAPI.resetPassword(token, newPwd);
        msg.textContent = 'Password updated! Redirecting to sign in…';
        msg.className = 'msg success';
        setTimeout(() => window.location.href = '/auth', 1800);
      } catch (err) {
        msg.textContent = err.message || 'Failed to reset password. The link may have expired.';
        msg.className = 'msg error';
        btn.disabled = false;
        btn.textContent = 'Update Password';
      }
    });
  </script>
</body>
</html>
