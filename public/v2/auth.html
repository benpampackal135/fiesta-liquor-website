<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In | Fiesta Liquor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/v2/styles.css">
</head>
<body class="auth-page">

  <header class="site-header">
    <div class="container header-inner">
      <div>
        <p class="eyebrow">Local. Curated. Reliable.</p>
        <h1><a href="/">Fiesta Liquor</a></h1>
      </div>
    </div>
  </header>

  <main class="auth-main">
    <div class="auth-card">
      <h2>Welcome back</h2>
      <p class="subtitle">Sign in to your account or create one below.</p>

      <div class="tab-row" role="tablist">
        <button class="tab-btn active" id="loginTab" role="tab" aria-selected="true" onclick="switchTab('login')">Sign In</button>
        <button class="tab-btn" id="registerTab" role="tab" aria-selected="false" onclick="switchTab('register')">Create Account</button>
      </div>

      <div id="msgBox" class="msg" role="alert"></div>

      <!-- Sign In Form -->
      <form id="loginForm" novalidate>
        <div class="form-group">
          <label for="loginEmail">Email</label>
          <input type="email" id="loginEmail" autocomplete="email" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label for="loginPassword">Password</label>
          <input type="password" id="loginPassword" autocomplete="current-password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="submit-btn" id="loginBtn">Sign In</button>
        <a href="/reset-password" class="back-link centered" style="margin-top:0.6rem;font-size:0.8rem;">Forgot password?</a>
      </form>

      <!-- Register Form -->
      <form id="registerForm" novalidate style="display:none">
        <div class="form-group">
          <label for="regName">Full Name</label>
          <input type="text" id="regName" autocomplete="name" placeholder="Jane Smith" required>
        </div>
        <div class="form-group">
          <label for="regEmail">Email</label>
          <input type="email" id="regEmail" autocomplete="email" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label for="regPhone">Phone (optional)</label>
          <input type="tel" id="regPhone" autocomplete="tel" placeholder="(555) 000-0000">
        </div>
        <div class="form-group">
          <label for="regPassword">Password</label>
          <input type="password" id="regPassword" autocomplete="new-password" placeholder="Min. 6 characters" required>
        </div>
        <button type="submit" class="submit-btn" id="registerBtn">Create Account</button>
      </form>

      <div class="divider">or</div>

      <button class="google-btn google-signin-btn" type="button">
        <svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Continue with Google
      </button>

      <a href="/" class="back-link centered">Back to store</a>
    </div>
  </main>

  <!-- Firebase Compat SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="/firebase.js"></script>
  <script src="/firebase-auth.js"></script>
  <script src="/api.js"></script>

  <script>
    // If user is already logged in, redirect home
    (function() {
      const user = localStorage.getItem('currentUser') || localStorage.getItem('firebaseUser');
      if (user) {
        try {
          const parsed = JSON.parse(user);
          if (parsed && parsed.email) {
            window.location.href = '/';
          }
        } catch (e) {}
      }
    })();

    function switchTab(tab) {
      const isLogin = tab === 'login';
      document.getElementById('loginTab').classList.toggle('active', isLogin);
      document.getElementById('registerTab').classList.toggle('active', !isLogin);
      document.getElementById('loginTab').ariaSelected = String(isLogin);
      document.getElementById('registerTab').ariaSelected = String(!isLogin);
      document.getElementById('loginForm').style.display = isLogin ? '' : 'none';
      document.getElementById('registerForm').style.display = isLogin ? 'none' : '';
      clearMsg();
    }

    function showMsg(text, type) {
      const el = document.getElementById('msgBox');
      el.textContent = text;
      el.className = `msg ${type} visible`;
    }

    function clearMsg() {
      const el = document.getElementById('msgBox');
      el.className = 'msg';
      el.textContent = '';
    }

    function setLoading(btnId, loading) {
      const btn = document.getElementById(btnId);
      btn.disabled = loading;
      btn.textContent = loading ? 'Please wait...' : (btnId === 'loginBtn' ? 'Sign In' : 'Create Account');
    }

    // Email login
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      clearMsg();
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;

      if (!email || !password) {
        showMsg('Please fill in all fields.', 'error');
        return;
      }

      setLoading('loginBtn', true);
      try {
        const data = await authAPI.login(email, password);
        if (data.token) {
          localStorage.setItem('authToken', data.token);
          localStorage.setItem('token', data.token);
        }
        if (data.user) {
          localStorage.setItem('currentUser', JSON.stringify(data.user));
        }
        const params = new URLSearchParams(window.location.search);
        const redirectTo = params.get('redirect') ? '/' + params.get('redirect') : '/';
        window.location.href = redirectTo;
      } catch (err) {
        showMsg(err.message || 'Login failed. Check your email and password.', 'error');
        setLoading('loginBtn', false);
      }
    });

    // Email register
    document.getElementById('registerForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      clearMsg();
      const name = document.getElementById('regName').value.trim();
      const email = document.getElementById('regEmail').value.trim();
      const phone = document.getElementById('regPhone').value.trim();
      const password = document.getElementById('regPassword').value;

      if (!name || !email || !password) {
        showMsg('Please fill in all required fields.', 'error');
        return;
      }
      if (password.length < 6) {
        showMsg('Password must be at least 6 characters.', 'error');
        return;
      }

      setLoading('registerBtn', true);
      try {
        if (typeof window.firebaseAuth !== 'undefined') {
          await window.firebaseAuth.signUpWithEmail(email, password, name);
        } else {
          await authAPI.register({ name, email, phone, password });
          const params = new URLSearchParams(window.location.search);
          const redirectTo = params.get('redirect') ? '/' + params.get('redirect') : '/';
          window.location.href = redirectTo;
        }
      } catch (err) {
        showMsg(err.message || 'Registration failed. This email may already be in use.', 'error');
        setLoading('registerBtn', false);
      }
    });
  </script>
</body>
</html>
