<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In | Fiesta Liquor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/v2/styles.css">
  <style>
    .auth-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .auth-main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }
    .auth-card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      width: 100%;
      max-width: 420px;
      padding: 2rem;
    }
    .auth-card h2 {
      font-size: 1.6rem;
      margin-bottom: 0.25rem;
    }
    .auth-card .subtitle {
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 1.5rem;
    }
    .tab-row {
      display: flex;
      border: 1px solid var(--line);
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 1.5rem;
    }
    .tab-btn {
      flex: 1;
      background: #fff;
      border: none;
      padding: 0.65rem;
      font: inherit;
      font-size: 0.9rem;
      cursor: pointer;
      color: var(--muted);
      transition: background 150ms, color 150ms;
    }
    .tab-btn.active {
      background: var(--accent);
      color: #fff;
    }
    .form-group {
      display: grid;
      gap: 0.3rem;
      margin-bottom: 1rem;
    }
    .form-group label {
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--text);
    }
    .form-group input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--bg-elevated);
      font: inherit;
      padding: 0.72rem 0.84rem;
      transition: border-color 150ms;
    }
    .form-group input:focus {
      outline: none;
      border-color: var(--accent);
    }
    .form-group input.error {
      border-color: #d9534f;
    }
    .submit-btn {
      width: 100%;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 0.8rem;
      font: inherit;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 150ms;
      margin-top: 0.5rem;
    }
    .submit-btn:hover { background: var(--accent-dark); }
    .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .divider {
      text-align: center;
      color: var(--muted);
      font-size: 0.8rem;
      margin: 1rem 0;
      position: relative;
    }
    .divider::before, .divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: calc(50% - 2rem);
      height: 1px;
      background: var(--line);
    }
    .divider::before { left: 0; }
    .divider::after { right: 0; }
    .google-btn {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 0.75rem;
      font: inherit;
      font-size: 0.9rem;
      cursor: pointer;
      transition: background 150ms, box-shadow 150ms;
    }
    .google-btn:hover { background: var(--bg); box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .google-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .google-icon {
      width: 18px;
      height: 18px;
    }
    .msg {
      border-radius: 8px;
      padding: 0.65rem 0.8rem;
      font-size: 0.85rem;
      margin-bottom: 1rem;
      display: none;
    }
    .msg.error { background: #fde8e8; color: #c0392b; }
    .msg.success { background: #e8f8ef; color: #1a7a4a; }
    .msg.visible { display: block; }
    .back-link {
      display: block;
      text-align: center;
      margin-top: 1.25rem;
      color: var(--muted);
      font-size: 0.85rem;
      text-decoration: none;
    }
    .back-link:hover { color: var(--accent); }
  </style>
</head>
<body class="auth-page">

  <header class="site-header">
    <div class="container header-inner">
      <div>
        <p class="eyebrow">Local. Curated. Reliable.</p>
        <h1><a href="/" style="text-decoration:none;color:inherit;">Fiesta Liquor</a></h1>
      </div>
    </div>
  </header>

  <main class="auth-main">
    <div class="auth-card">
      <h2>Welcome back</h2>
      <p class="subtitle">Sign in to your account or create one below.</p>

      <div class="tab-row" role="tablist">
        <button class="tab-btn active" id="loginTab" role="tab" aria-selected="true" onclick="switchTab('login')">Sign In</button>
        <button class="tab-btn" id="registerTab" role="tab" aria-selected="false" onclick="switchTab('register')">Create Account</button>
      </div>

      <div id="msgBox" class="msg" role="alert"></div>

      <!-- Sign In Form -->
      <form id="loginForm" novalidate>
        <div class="form-group">
          <label for="loginEmail">Email</label>
          <input type="email" id="loginEmail" autocomplete="email" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label for="loginPassword">Password</label>
          <input type="password" id="loginPassword" autocomplete="current-password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="submit-btn" id="loginBtn">Sign In</button>
        <a href="/reset-password" style="display:block;text-align:right;font-size:0.8rem;color:var(--muted);margin-top:0.6rem;text-decoration:none;">Forgot password?</a>
      </form>

      <!-- Register Form -->
      <form id="registerForm" novalidate style="display:none">
        <div class="form-group">
          <label for="regName">Full Name</label>
          <input type="text" id="regName" autocomplete="name" placeholder="Jane Smith" required>
        </div>
        <div class="form-group">
          <label for="regEmail">Email</label>
          <input type="email" id="regEmail" autocomplete="email" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label for="regPhone">Phone (optional)</label>
          <input type="tel" id="regPhone" autocomplete="tel" placeholder="(555) 000-0000">
        </div>
        <div class="form-group">
          <label for="regPassword">Password</label>
          <input type="password" id="regPassword" autocomplete="new-password" placeholder="Min. 6 characters" required>
        </div>
        <button type="submit" class="submit-btn" id="registerBtn">Create Account</button>
      </form>

      <div class="divider">or</div>

      <button class="google-btn google-signin-btn" type="button">
        <svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Continue with Google
      </button>

      <a href="/" class="back-link">← Back to store</a>
    </div>
  </main>

  <!-- Firebase Compat SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="/firebase.js"></script>
  <script src="/firebase-auth.js"></script>
  <script src="/api.js"></script>

  <script>
    // If user is already logged in, redirect home
    (function() {
      const user = localStorage.getItem('currentUser') || localStorage.getItem('firebaseUser');
      if (user) {
        try {
          const parsed = JSON.parse(user);
          if (parsed && parsed.email) {
            window.location.href = '/';
          }
        } catch (e) {}
      }
    })();

    function switchTab(tab) {
      const isLogin = tab === 'login';
      document.getElementById('loginTab').classList.toggle('active', isLogin);
      document.getElementById('registerTab').classList.toggle('active', !isLogin);
      document.getElementById('loginTab').ariaSelected = String(isLogin);
      document.getElementById('registerTab').ariaSelected = String(!isLogin);
      document.getElementById('loginForm').style.display = isLogin ? '' : 'none';
      document.getElementById('registerForm').style.display = isLogin ? 'none' : '';
      clearMsg();
    }

    function showMsg(text, type) {
      const el = document.getElementById('msgBox');
      el.textContent = text;
      el.className = `msg ${type} visible`;
    }

    function clearMsg() {
      const el = document.getElementById('msgBox');
      el.className = 'msg';
      el.textContent = '';
    }

    function setLoading(btnId, loading) {
      const btn = document.getElementById(btnId);
      btn.disabled = loading;
      btn.textContent = loading ? 'Please wait...' : (btnId === 'loginBtn' ? 'Sign In' : 'Create Account');
    }

    // Email login
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      clearMsg();
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;

      if (!email || !password) {
        showMsg('Please fill in all fields.', 'error');
        return;
      }

      setLoading('loginBtn', true);
      try {
        // Try Firebase email/password first (handles Firebase + native backend users)
        if (typeof window.firebaseAuth !== 'undefined') {
          await window.firebaseAuth.signInWithEmail(email, password);
          // firebase-auth.js handles redirect
        } else {
          // Fallback: native backend auth
          await authAPI.login(email, password);
          const params = new URLSearchParams(window.location.search);
          const redirectTo = params.get('redirect') ? '/' + params.get('redirect') : '/';
          window.location.href = redirectTo;
        }
      } catch (err) {
        showMsg(err.message || 'Login failed. Check your email and password.', 'error');
        setLoading('loginBtn', false);
      }
    });

    // Email register
    document.getElementById('registerForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      clearMsg();
      const name = document.getElementById('regName').value.trim();
      const email = document.getElementById('regEmail').value.trim();
      const phone = document.getElementById('regPhone').value.trim();
      const password = document.getElementById('regPassword').value;

      if (!name || !email || !password) {
        showMsg('Please fill in all required fields.', 'error');
        return;
      }
      if (password.length < 6) {
        showMsg('Password must be at least 6 characters.', 'error');
        return;
      }

      setLoading('registerBtn', true);
      try {
        if (typeof window.firebaseAuth !== 'undefined') {
          await window.firebaseAuth.signUpWithEmail(email, password, name);
          // firebase-auth.js handles redirect
        } else {
          await authAPI.register({ name, email, phone, password });
          const params = new URLSearchParams(window.location.search);
          const redirectTo = params.get('redirect') ? '/' + params.get('redirect') : '/';
          window.location.href = redirectTo;
        }
      } catch (err) {
        showMsg(err.message || 'Registration failed. This email may already be in use.', 'error');
        setLoading('registerBtn', false);
      }
    });
  </script>
</body>
</html>
